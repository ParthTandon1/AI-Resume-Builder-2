<!DOCTYPE html>
<html>
<head>
<title>Create Resume</title>

<style>

body {
    font-family: Arial;
    background: linear-gradient(to right, #0a2a66, #3b82f6);
    margin: 0;
    transition: all 0.3s ease;
}

/* DARK MODE */
.dark {
    background: #121212;
    color: white;
}

/* CONTAINER */
.container {
    width: 75%;
    margin: 40px auto;
    background: #ffffff;
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0px 0px 25px rgba(0,0,0,0.25);
}

.dark .container {
    background: #1e1e1e;
}

/* HEADER */
.header {
    text-align: center;
    margin-bottom: 30px;
}

.header h2 {
    color: #0a2a66;
}

/* SECTION TITLE */
.section-title {
    font-weight: bold;
    color: #0a2a66;
    margin-top: 25px;
    margin-bottom: 8px;
}

/* ROW LAYOUT */
.row {
    display: flex;
    gap: 20px;
}

.col {
    flex: 1;
}

/* INPUTS */
input, textarea, select {
    width: 100%;
    padding: 12px;
    margin-top: 5px;
    margin-bottom: 15px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

textarea {
    height: 90px;
}

.dark input,
.dark textarea {
    background: #333;
    color: white;
}

/* BUTTON */
button {
    width: 100%;
    padding: 14px;
    background: #0a2a66;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    transform: scale(1.02);
}

/* LABEL FIX (🔥 IMPORTANT) */
label {
    font-weight: 600;
    display: block;
    margin-top: 10px;
}

/* TOGGLE BUTTON */
.toggle-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    padding: 10px;
    background: white;
    border: none;
    cursor: pointer;
}

</style>

</head>

<body>

<div class="navbar">
    <a href="#">Home</a>
    <a href="#">Resume</a>

    <button onclick="toggleTheme()" style="
        float:right;
        margin-right:20px;
        padding:6px 10px;
    ">
        Toggle Theme
    </button>
</div>

<!-- TOGGLE BUTTON -->
<button class="toggle-btn" onclick="toggleTheme()">🌙</button>

<div class="container">

<div class="header">
<h2>Create Your Resume</h2>
</div>

<form method="POST">

<!-- TEMPLATE (MOVED INSIDE FORM 🔥) -->
<div class="section-title">Select Resume Template</div>
<select name="template" required>
    <option value="modern">Modern Resume</option>
    <option value="classic">Classic Resume</option>
</select>

<div class="section-title">PERSONAL DETAILS</div>

<label>Full Name</label>
<input type="text" name="full_name" placeholder="Enter your full name">

<label>Address</label>
<input type="text" name="address" placeholder="Enter your address">

<label>Phone Number</label>
<input type="text" name="phone" placeholder="Enter phone number">

<label>Email</label>
<input type="email" name="email" placeholder="Enter email">

<div class="section-title">ABOUT</div>
<label>Profile Summary</label>
<textarea name="profile" placeholder="Write about yourself"></textarea>

<div class="section-title">EDUCATION</div>
<label>Education Details</label>
<textarea name="education" placeholder="B.Tech | College | Year"></textarea>

<div class="section-title">SKILLS</div>
<label>Skills</label>
<textarea name="skills" placeholder="Python, SQL, ML"></textarea>

<div class="section-title">INTERNSHIP EXPERIENCE</div>
<label>Experience</label>
<textarea name="internships" placeholder="Internships / Work Experience"></textarea>

<div class="section-title">PROJECTS</div>
<label>Projects</label>
<textarea name="projects"></textarea>

<div class="section-title">CERTIFICATIONS</div>
<label>Certifications</label>
<textarea name="certifications"></textarea>

<div class="section-title">ACHIEVEMENTS</div>
<label>Achievements</label>
<textarea name="achievements"></textarea>

<!-- 🔥 FIXED PART STARTS HERE -->

<div class="section-title">SEMINARS / WORKSHOPS</div>
<label>Seminars</label>
<textarea name="seminars" placeholder="Enter seminars attended"></textarea>

<div class="section-title">PUBLICATIONS</div>
<label>Publications</label>
<textarea name="publications" placeholder="Enter publications"></textarea>

<!-- 🔥 FIXED PART ENDS HERE -->

<br><br>

<button type="submit">Generate Resume</button>

</form>

</div>

<script>

// 🌙 DARK MODE TOGGLE
function toggleTheme() {
    document.body.classList.toggle("dark");
}

// ✅ VALIDATION
document.querySelector("form").onsubmit = function(e) {
    let email = document.querySelector("input[name='email']").value;

    if (!email.includes("@")) {
        alert("Invalid email");
        e.preventDefault();
        return;
    }

    localStorage.setItem("user_email", email);
};

// 🚀 AJAX CHECK
fetch('/dashboard')
.then(res => res.text())
.then(data => {
    console.log("AJAX working ✔️");
});

</script>

</body>
</html>
